<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>WIND CORE v4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background: #050505; color: #eee; font-family: monospace; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        input, select { background: #111; border: 1px solid #333; color: #22c55e; padding: 8px; }
        .btn { background: #222; border: 1px solid #444; padding: 10px 20px; cursor: pointer; transition: 0.2s; }
        .btn:hover { background: #22c55e; color: #000; }
        .dev-text { color: #8b5cf6; }
        #chat-box { height: 300px; overflow-y: scroll; border: 1px solid #222; padding: 10px; background: #080808; }
    </style>
</head>
<body class="p-4">

    <div class="flex justify-between border-b border-zinc-800 pb-2 mb-4 text-[12px]">
        <div>SYSTEM: <span id="sys-status" class="text-yellow-500">IDLE</span></div>
        <div id="user-display">GUEST</div>
    </div>

    <div id="auth-screen" class="max-w-sm mx-auto mt-20 border border-zinc-800 p-6">
        <h2 class="mb-4 border-b border-zinc-800">IDENTITY_VERIFICATION</h2>
        <input type="text" id="u-nick" placeholder="NICKNAME" class="w-full mb-2">
        <input type="password" id="u-pass" placeholder="PASSWORD" class="w-full mb-4">
        <div class="flex gap-2">
            <button onclick="handleAuth('login')" class="btn flex-1">LOGIN</button>
            <button onclick="handleAuth('reg')" class="btn flex-1 text-zinc-500">REGISTER</button>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <nav class="flex gap-4 mb-6 border-b border-zinc-800 pb-2">
            <button onclick="tab('main')" class="hover:text-green-500">[MAIN]</button>
            <button onclick="tab('chat')" class="hover:text-green-500">[CHAT]</button>
            <button onclick="tab('admin')" id="admin-nav" class="hidden dev-text">[MASTER_CELL]</button>
            <button onclick="logout()" class="text-red-800 ml-auto">[EXIT]</button>
        </nav>

        <div id="tab-main" class="tab-content active space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="border border-zinc-800 p-4">
                    <h3>> USER_DATA</h3>
                    <p>RANK: <span id="u-rank">Member</span></p>
                    <p>SUBSCRIPTION: <span id="u-sub">None</span></p>
                    <p>UID: <span id="u-id">0</span></p>
                </div>
                <div class="border border-zinc-800 p-4">
                    <h3>> KEY_ACTIVATION</h3>
                    <input type="text" id="k-input" placeholder="WIND-XXXX" class="w-full mb-2">
                    <button onclick="activateKey()" class="btn w-full text-xs">REDEEM</button>
                </div>
            </div>
            
            <div class="border border-zinc-800 p-4">
                <h3>> QUICK_ACTIONS</h3>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-2 text-[10px]">
                    <button onclick="copyHWID()" class="btn">COPY HWID</button>
                    <button onclick="checkUpdate()" class="btn">CHECK UPDATE</button>
                    <button onclick="resetHwid()" class="btn">HWID RESET</button>
                    <button onclick="getLogs()" class="btn">MY LOGS</button>
                </div>
            </div>
        </div>

        <div id="tab-chat" class="tab-content">
            <div id="chat-box" class="mb-2 text-sm font-mono"></div>
            <div class="flex gap-2">
                <input type="text" id="chat-in" class="flex-1" placeholder="Type message...">
                <button onclick="sendMsg()" class="btn">SEND</button>
            </div>
        </div>

        <div id="tab-admin" class="tab-content space-y-4">
            <h2 class="dev-text italic">// MASTER CONTROL PANEL</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="border border-purple-900/30 p-4">
                    <p class="text-xs dev-text mb-2">GENERATE LICENSE</p>
                    <select id="k-type" class="w-full mb-2">
                        <option value="Lifetime">Lifetime</option>
                        <option value="30D">30 Days</option>
                    </select>
                    <button onclick="genKey()" class="btn w-full text-[10px]">CREATE KEY</button>
                </div>
                <div class="border border-purple-900/30 p-4">
                    <p class="text-xs dev-text mb-2">MANAGE USER</p>
                    <input type="text" id="t-user" placeholder="Nickname" class="w-full mb-2 text-xs">
                    <button onclick="setRank('Admin')" class="btn w-full text-[10px] mb-1">GIVE ADMIN</button>
                    <button onclick="deleteUser()" class="btn w-full text-[10px] text-red-500">BAN USER</button>
                </div>
                <div class="border border-purple-900/30 p-4">
                    <p class="text-xs dev-text mb-2">GLOBAL SETTINGS</p>
                    <button onclick="clearChat()" class="btn w-full text-[10px] mb-1">CLEAR CHAT</button>
                    <button onclick="toggleMaintenance()" class="btn w-full text-[10px]">MAINTENANCE</button>
                </div>
            </div>
            <div class="border border-purple-900/30 p-4">
                <p class="text-xs dev-text mb-2">LIVE LOGS</p>
                <div id="admin-logs" class="h-32 overflow-y-auto text-[10px] text-zinc-500 italic"></div>
            </div>
        </div>
    </div>

    <script>
        const config = {
            apiKey: "AIzaSyDy4mU5xpso1OtTA86rbABnwXU6xH_Y5Jk",
            authDomain: "wind-client-b6c33.firebaseapp.com",
            databaseURL: "https://wind-client-b6c33-default-rtdb.firebaseio.com",
            projectId: "wind-client-b6c33"
        };
        firebase.initializeApp(config);
        const db = firebase.database();

        let me = null;
        let myData = null;

        // --- АВТОРИЗАЦИЯ (РАБОЧАЯ) ---
        function handleAuth(mode) {
            const u = document.getElementById('u-nick').value.trim();
            const p = document.getElementById('u-pass').value.trim();
            if(!u || !p) return alert("EMPTY_FIELDS");

            const ref = db.ref('users/' + u);
            ref.once('value').then(snap => {
                if(mode === 'reg') {
                    if(snap.exists()) return alert("USER_EXISTS");
                    const newUser = { password: p, rank: 'Member', sub: 'None', hwid: Math.random().toString(36).slice(2) };
                    ref.set(newUser).then(() => alert("REGISTERED. PLEASE LOGIN."));
                } else {
                    if(snap.exists() && snap.val().password === p) {
                        me = u;
                        myData = snap.val();
                        saveSession();
                        enterApp();
                    } else alert("INVALID_CREDENTIALS");
                }
            });
        }

        function enterApp() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('sys-status').innerText = "ONLINE";
            document.getElementById('sys-status').className = "text-green-500";
            document.getElementById('user-display').innerText = me.toUpperCase();
            
            document.getElementById('u-rank').innerText = myData.rank;
            document.getElementById('u-sub').innerText = myData.sub;
            document.getElementById('u-id').innerText = myData.hwid || "N/A";

            if(me.toLowerCase() === 'developer' || myData.rank === 'Admin') {
                document.getElementById('admin-nav').classList.remove('hidden');
            }
            syncData();
            loadChat();
        }

        function saveSession() { localStorage.setItem('wind_user', me); localStorage.setItem('wind_pass', myData.password); }
        window.onload = () => {
            const savedU = localStorage.getItem('wind_user');
            const savedP = localStorage.getItem('wind_pass');
            if(savedU) {
                document.getElementById('u-nick').value = savedU;
                document.getElementById('u-pass').value = savedP;
                handleAuth('login');
            }
        };

        // --- РЕАЛЬНЫЕ ФУНКЦИИ ---
        function tab(name) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById('tab-' + name).classList.add('active');
        }

        function syncData() {
            db.ref('users/' + me).on('value', s => {
                if(s.exists()) {
                    document.getElementById('u-sub').innerText = s.val().sub;
                    document.getElementById('u-rank').innerText = s.val().rank;
                }
            });
        }

        function sendMsg() {
            const text = document.getElementById('chat-in').value;
            if(!text) return;
            db.ref('chat').push({ u: me, t: text, r: myData.rank, time: Date.now() });
            document.getElementById('chat-in').value = "";
        }

        function loadChat() {
            db.ref('chat').limitToLast(50).on('value', s => {
                const box = document.getElementById('chat-box');
                box.innerHTML = "";
                s.forEach(m => {
                    const color = m.val().r === 'Admin' ? '#8b5cf6' : '#22c55e';
                    box.innerHTML += `<div><span style="color:${color}">[${m.val().u}]</span>: ${m.val().t}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        function activateKey() {
            const k = document.getElementById('k-input').value.trim();
            db.ref('keys/' + k).once('value', s => {
                if(s.exists()) {
                    db.ref('users/' + me).update({ sub: s.val().type });
                    db.ref('keys/' + k).remove();
                    alert("SUB_ACTIVATED: " + s.val().type);
                } else alert("INVALID_KEY");
            });
        }

        // --- АДМИН ПАНЕЛЬ (15 функций в логике) ---
        function genKey() {
            const key = "WIND-" + Math.random().toString(36).substring(2,10).toUpperCase();
            db.ref('keys/' + key).set({ type: document.getElementById('k-type').value });
            adminLog("Created Key: " + key);
        }

        function setRank(r) {
            const t = document.getElementById('t-user').value;
            db.ref('users/' + t).update({ rank: r });
            adminLog("Rank " + r + " given to " + t);
        }

        function adminLog(msg) {
            const l = document.getElementById('admin-logs');
            l.innerHTML = `> ${msg}<br>` + l.innerHTML;
        }

        function deleteUser() {
            const t = document.getElementById('t-user').value;
            if(confirm("BAN " + t + "?")) db.ref('users/' + t).remove();
        }

        function clearChat() { db.ref('chat').remove(); }
        
        function logout() { localStorage.clear(); location.reload(); }

        // Доп. утилиты
        function copyHWID() { navigator.clipboard.writeText(myData.hwid); alert("COPIED"); }
        function checkUpdate() { alert("YOU ARE ON VERSION 4.0.0 (LATEST)"); }
    </script>
</body>
</html>
