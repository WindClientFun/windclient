<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>WIND | Hyper Stable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    
    <style>
        body { background: #020205; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }
        
        /* Слой кнопок — САМЫЙ ВЫСОКИЙ */
        .interactive-layer { position: relative; z-index: 9999; }
        
        .nebula-card {
            background: rgba(10, 10, 15, 0.9);
            border: 2px solid rgba(0, 255, 204, 0.3);
            box-shadow: 0 0 40px rgba(0, 255, 204, 0.1);
            border-radius: 30px;
        }

        .btn-hyper {
            background: #00ffcc;
            color: black;
            font-weight: 900;
            padding: 20px;
            border-radius: 12px;
            cursor: pointer !important;
            transition: 0.2s;
            text-transform: uppercase;
            width: 100%;
            display: block;
            border: none;
        }
        .btn-hyper:hover { filter: brightness(1.2); transform: scale(1.02); }
        .btn-hyper:active { transform: scale(0.98); }

        .input-nebula {
            background: #0a0a0a;
            border: 1px solid #333;
            padding: 15px;
            border-radius: 12px;
            color: #00ffcc;
            width: 100%;
            text-align: center;
            outline: none;
        }
        .input-nebula:focus { border-color: #00ffcc; }

        #error-out { color: #ff4444; font-size: 11px; margin-top: 15px; font-family: monospace; min-height: 20px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <canvas id="bg-stars"></canvas>

    <div id="auth-page" class="interactive-layer min-h-screen flex items-center justify-center">
        <div class="nebula-card p-10 w-full max-w-md text-center">
            <h1 style="font-family: 'Orbitron'; color: #00ffcc; font-size: 45px; margin-bottom: 30px;">WIND</h1>
            
            <div class="space-y-4">
                <input type="text" id="u-name" placeholder="LOGIN" class="input-nebula">
                <input type="password" id="u-pass" placeholder="PASSWORD" class="input-nebula">
                
                <button onclick="handleAuth()" id="main-btn" class="btn-hyper">INITIALIZE SYSTEM</button>
                
                <div id="error-out"></div>
            </div>
        </div>
    </div>

    <div id="main-app" class="interactive-layer hidden min-h-screen p-8">
        <div class="flex justify-between border-b border-cyan-400/20 pb-4 mb-10">
            <span style="font-family: 'Syncopate';" class="text-cyan-400">WIND_CORE_v6</span>
            <span id="welcome-user" class="text-xs uppercase font-bold">GUEST</span>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 nebula-card p-8">
                <h2 class="text-2xl font-black mb-6">DASHBOARD</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white/5 p-6 rounded-2xl border border-white/5">
                        <div class="text-[10px] opacity-40 mb-1">USER_RANK</div>
                        <div id="val-rank" class="font-bold">...</div>
                    </div>
                    <div class="bg-white/5 p-6 rounded-2xl border border-white/5">
                        <div class="text-[10px] opacity-40 mb-1">SUB_STATUS</div>
                        <div id="val-sub" class="font-bold text-purple-400">...</div>
                    </div>
                </div>
            </div>

            <div class="nebula-card p-6 h-[400px] flex flex-col">
                <div id="chat-box" class="flex-1 overflow-y-auto text-[11px] space-y-2 mb-4 font-mono"></div>
                <div class="flex gap-2">
                    <input type="text" id="chat-in" class="input-nebula p-2 text-left text-xs" placeholder="Message">
                    <button onclick="sendMsg()" class="btn-hyper w-10 p-0">></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Инициализация базы
        const config = {
            apiKey: "AIzaSyDy4mU5xpso1OtTA86rbABnwXU6xH_Y5Jk",
            authDomain: "wind-client-b6c33.firebaseapp.com",
            databaseURL: "https://wind-client-b6c33-default-rtdb.firebaseio.com",
            projectId: "wind-client-b6c33"
        };
        firebase.initializeApp(config);
        const db = firebase.database();

        const btn = document.getElementById('main-btn');
        const err = document.getElementById('error-out');

        function handleAuth() {
            const u = document.getElementById('u-name').value.trim();
            const p = document.getElementById('u-pass').value.trim();

            if(!u || !p) {
                err.innerText = "ПОЛЯ НЕ МОГУТ БЫТЬ ПУСТЫМИ";
                return;
            }

            btn.innerText = "CONNECTING...";
            btn.style.opacity = "0.5";

            db.ref('users/' + u).once('value').then(s => {
                if(s.exists()) {
                    if(s.val().password === p) {
                        launch(u, s.val());
                    } else {
                        err.innerText = "НЕВЕРНЫЙ ПАРОЛЬ";
                        resetBtn();
                    }
                } else {
                    const data = { password: p, rank: 'Member', sub: 'None' };
                    db.ref('users/' + u).set(data).then(() => launch(u, data));
                }
            }).catch(e => {
                err.innerText = "ОШИБКА БАЗЫ: " + e.message;
                resetBtn();
            });
        }

        function resetBtn() {
            btn.innerText = "INITIALIZE SYSTEM";
            btn.style.opacity = "1";
        }

        function launch(nick, data) {
            document.getElementById('auth-page').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('welcome-user').innerText = nick;
            document.getElementById('val-rank').innerText = data.rank;
            document.getElementById('val-sub').innerText = data.sub;
            
            // Запуск чата
            db.ref('chat').limitToLast(15).on('value', s => {
                const box = document.getElementById('chat-box');
                box.innerHTML = "";
                s.forEach(m => {
                    box.innerHTML += `<div><span class="text-cyan-400">[${m.val().u}]</span>: ${m.val().m}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        function sendMsg() {
            const t = document.getElementById('chat-in').value;
            const u = document.getElementById('welcome-user').innerText;
            if(t) {
                db.ref('chat').push({ u: u, m: t });
                document.getElementById('chat-in').value = "";
            }
        }

        // Фон — простенький для стабильности
        const c = document.getElementById('bg-stars');
        const x = c.getContext('2d');
        function sz() { c.width = window.innerWidth; c.height = window.innerHeight; }
        window.onresize = sz; sz();
        function loop() {
            x.fillStyle = 'rgba(2,2,5,0.2)'; x.fillRect(0,0,c.width,c.height);
            for(i=0;i<50;i++) {
                x.fillStyle = '#00ffcc';
                x.fillRect(Math.random()*c.width, Math.random()*c.height, 1, 1);
            }
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
