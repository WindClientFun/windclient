<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>WIND | Elysium Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;800&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #00ff88; --bg: #030303; }
        body { 
            background: var(--bg); color: white; font-family: 'Inter', sans-serif; 
            overflow: hidden; user-select: none;
        }
        h1, h2, .syne { font-family: 'Syne', sans-serif; }

        /* Эстетичный фон */
        .orb {
            position: fixed; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(0,255,136,0.07) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%; pointer-events: none; z-index: -1;
            transition: 0.5s cubic-bezier(0.1, 0.7, 1.0, 0.1);
        }

        /* Кнопки и Стекло */
        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(30px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        .btn-main {
            background: linear-gradient(135deg, var(--accent), #00ccff);
            color: black; font-weight: 800; cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; overflow: hidden;
        }
        .btn-main:hover { transform: scale(1.05) translateY(-3px); box-shadow: 0 15px 30px rgba(0,255,136,0.3); }
        .btn-main:active { transform: scale(0.95); }

        .input-field {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s; outline: none;
        }
        .input-field:focus { border-color: var(--accent); background: rgba(255,255,255,0.07); }

        /* Дождь */
        .drop {
            position: fixed; background: linear-gradient(to bottom, transparent, #00ff88);
            width: 1px; height: 60px; opacity: 0.2; pointer-events: none;
            animation: fall linear infinite;
        }
        @keyframes fall { to { transform: translateY(110vh); } }

        .tab-btn { opacity: 0.4; transition: 0.3s; cursor: pointer; font-size: 11px; letter-spacing: 2px; }
        .tab-btn.active { opacity: 1; color: var(--accent); }
    </style>
</head>
<body>

    <div class="orb" id="cursor-orb"></div>
    <div id="rain-layer"></div>

    <div id="toast" class="fixed top-10 left-1/2 -translate-x-1/2 glass px-10 py-4 rounded-full z-[1000] opacity-0 transition-all duration-700 pointer-events-none text-sm font-bold"></div>

    <div id="auth-page" class="min-h-screen flex items-center justify-center p-6">
        <div class="glass p-12 rounded-[4rem] w-full max-w-sm text-center border-t-2 border-emerald-500/20">
            <h1 class="text-6xl font-black italic mb-2 tracking-tighter" style="text-shadow: 0 0 30px var(--accent)">WIND</h1>
            <p class="text-[10px] text-gray-500 uppercase tracking-[0.3em] mb-12">Universal Ecosystem</p>
            
            <div class="space-y-4">
                <input type="text" id="u-nick" placeholder="Username" class="input-field w-full p-5 rounded-3xl text-sm">
                <input type="password" id="u-pass" placeholder="Password" class="input-field w-full p-5 rounded-3xl text-sm">
                <button onclick="authAction()" class="btn-main w-full py-5 rounded-3xl text-xs uppercase tracking-widest mt-6">Authorize</button>
            </div>
        </div>
    </div>

    <div id="main-ui" class="hidden min-h-screen flex flex-col items-center pt-24 px-6">
        
        <nav class="glass px-10 py-5 rounded-full flex gap-12 mb-20">
            <div onclick="tab('home')" id="t-home" class="tab-btn active">CORE</div>
            <div onclick="tab('shop')" id="t-shop" class="tab-btn">PRODUCTS</div>
            <div onclick="tab('chat')" id="t-chat" class="tab-btn">COMMUNITY</div>
            <div onclick="tab('dev')" id="t-dev" class="tab-btn hidden dev-text">MASTER</div>
        </nav>

        <div id="p-home" class="w-full max-w-5xl grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 glass p-12 rounded-[4rem]">
                <h2 class="text-5xl font-extrabold syne mb-6">Hello, <span id="display-name" class="text-emerald-400">User</span></h2>
                <p class="text-gray-500 leading-loose mb-10">Добро пожаловать в обновленную версию WIND. Мы оптимизировали все процессы, чтобы ваш опыт был максимально плавным.</p>
                <div class="flex gap-4">
                    <input type="text" id="k-redeem" placeholder="WIND-XXXX-XXXX" class="flex-1 input-field p-4 rounded-3xl">
                    <button onclick="redeem()" class="btn-main px-10 rounded-3xl text-[10px]">REDEEM</button>
                </div>
            </div>
            
            <div class="glass p-8 rounded-[4rem] flex flex-col items-center justify-center text-center">
                <div class="w-24 h-24 rounded-full border-2 border-emerald-500/20 flex items-center justify-center mb-6 animate-pulse">
                    <div class="w-16 h-16 rounded-full bg-emerald-500/10 flex items-center justify-center">🎵</div>
                </div>
                <p id="m-status" class="text-xs font-bold text-emerald-400 mb-6">Lofi Zen Playing</p>
                <button onclick="toggleMusic()" class="glass px-8 py-3 rounded-full text-[10px] hover:bg-white/5 transition">PLAY/PAUSE</button>
            </div>
        </div>

        <div id="p-chat" class="hidden w-full max-w-4xl glass rounded-[4rem] flex flex-col overflow-hidden h-[600px]">
            <div class="p-8 border-b border-white/5 font-black text-xs tracking-widest uppercase opacity-40">Live Feed</div>
            <div id="chat-messages" class="flex-1 p-10 overflow-y-auto space-y-6 text-sm"></div>
            <div class="p-6 bg-white/5 flex gap-4">
                <input type="text" id="chat-msg" placeholder="Write something..." class="flex-1 input-field p-4 rounded-full">
                <button onclick="sendMsg()" class="btn-main w-14 h-14 rounded-full flex items-center justify-center">></button>
            </div>
        </div>
    </div>

    <audio id="bg-m" loop src="https://stream.zeno.fm/0r0xa792kwzuv"></audio>
    <audio id="s-ok" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>

    <script>
        // Инициализация (Твоя база)
        const firebaseConfig = {
            apiKey: "AIzaSyDy4mU5xpso1OtTA86rbABnwXU6xH_Y5Jk",
            authDomain: "wind-client-b6c33.firebaseapp.com",
            databaseURL: "https://wind-client-b6c33-default-rtdb.firebaseio.com",
            projectId: "wind-client-b6c33"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let user = null;

        // Эстетичное уведомление
        function notify(text) {
            const t = document.getElementById('toast');
            t.innerText = text;
            t.style.opacity = '1'; t.style.transform = 'translate(-50%, 0)';
            setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translate(-50%, -20px)'; }, 3000);
        }

        // --- AUTH (ЖЕЛЕЗОБЕТОННЫЙ) ---
        function authAction() {
            const u = document.getElementById('u-nick').value.trim();
            const p = document.getElementById('u-pass').value.trim();
            if(!u || !p) return notify("Заполни данные!");

            db.ref('users/' + u).once('value', s => {
                if(s.exists()) {
                    if(s.val().password === p) startApp(u, s.val());
                    else notify("Неверный пароль!");
                } else {
                    db.ref('users/' + u).set({ password: p, rank: 'Member', sub: 'None' });
                    notify("Аккаунт создан! Входим...");
                    setTimeout(() => authAction(), 1000);
                }
            });
        }

        function startApp(nick, data) {
            user = { nick, ...data };
            localStorage.setItem('wind_session', JSON.stringify(user));
            
            document.getElementById('auth-page').style.display = 'none';
            document.getElementById('main-ui').classList.remove('hidden');
            document.getElementById('display-name').innerText = nick;
            
            if(nick.toLowerCase() === 'developer') document.getElementById('t-dev').classList.remove('hidden');
            
            loadChat();
            document.getElementById('s-ok').play();
        }

        // --- NAVIGATION ---
        function tab(id) {
            ['home', 'shop', 'chat', 'dev'].forEach(t => {
                const p = document.getElementById('p-' + t);
                const b = document.getElementById('t-' + t);
                if(p) p.classList.add('hidden');
                if(b) b.classList.remove('active');
            });
            document.getElementById('p-' + id).classList.remove('hidden');
            document.getElementById('t-' + id).classList.add('active');
        }

        // --- CHAT ---
        function sendMsg() {
            const txt = document.getElementById('chat-msg').value;
            if(!txt) return;
            db.ref('chat').push({ u: user.nick, m: txt, r: user.rank });
            document.getElementById('chat-msg').value = "";
        }

        function loadChat() {
            db.ref('chat').limitToLast(30).on('value', s => {
                const box = document.getElementById('chat-messages');
                box.innerHTML = "";
                s.forEach(m => {
                    const isDev = m.val().r === 'Admin' || m.val().u === 'developer';
                    box.innerHTML += `<div>
                        <span class="font-black text-[10px] tracking-tighter ${isDev ? 'text-emerald-400' : 'text-gray-600'}">${m.val().u.toUpperCase()}</span>
                        <p class="mt-1 opacity-80">${m.val().m}</p>
                    </div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        // --- EFFECTS ---
        // Следящий свет
        document.addEventListener('mousemove', (e) => {
            const orb = document.getElementById('cursor-orb');
            orb.style.left = (e.clientX - 300) + 'px';
            orb.style.top = (e.clientY - 300) + 'px';
        });

        // Дождь
        for(let i=0; i<30; i++) {
            const d = document.createElement('div');
            d.className = 'drop';
            d.style.left = Math.random() * 100 + 'vw';
            d.style.animationDuration = Math.random() * 0.5 + 0.5 + 's';
            document.getElementById('rain-layer').appendChild(d);
        }

        // Музыка
        let playing = false;
        function toggleMusic() {
            const m = document.getElementById('bg-m');
            if(!playing) m.play(); else m.pause();
            playing = !playing;
            document.getElementById('m-status').innerText = playing ? "WIND ZEN: ON" : "WIND ZEN: OFF";
        }

        // Авто-вход
        window.onload = () => {
            const saved = localStorage.getItem('wind_session');
            if(saved) {
                const d = JSON.parse(saved);
                document.getElementById('u-nick').value = d.nick;
                document.getElementById('u-pass').value = d.password;
                authAction();
            }
        }
    </script>
</body>
</html>
