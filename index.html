<section id="auth-section" class="py-20 px-6 max-w-md mx-auto">
    <div class="glass p-8 rounded-[2.5rem] border border-white/10">
        <div class="flex justify-center gap-4 mb-8">
            <button onclick="switchTab('login')" id="tab-login" class="text-purple-500 font-bold border-b-2 border-purple-500 pb-1">Вход</button>
            <button onclick="switchTab('register')" id="tab-register" class="text-gray-500 hover:text-white transition">Регистрация</button>
        </div>

        <div id="form-login" class="space-y-4">
            <input type="email" id="log-email" placeholder="Email" class="w-full p-4 rounded-2xl outline-none">
            <input type="password" id="log-pass" placeholder="Пароль" class="w-full p-4 rounded-2xl outline-none">
            <button onclick="signIn()" class="w-full btn-purple py-4 rounded-2xl font-bold">ВОЙТИ</button>
        </div>

        <div id="form-register" class="hidden space-y-4">
            <input type="text" id="reg-nick" placeholder="Никнейм в чите" class="w-full p-4 rounded-2xl outline-none">
            <input type="email" id="reg-email" placeholder="Email" class="w-full p-4 rounded-2xl outline-none">
            <input type="password" id="reg-pass" placeholder="Пароль" class="w-full p-4 rounded-2xl outline-none">
            <button onclick="signUp()" class="w-full btn-purple py-4 rounded-2xl font-bold">СОЗДАТЬ АККАУНТ</button>
        </div>
    </div>
</section>

<script>
    // ТВОЙ КОНФИГ С АПИ КЛЮЧОМ
    const firebaseConfig = {
        apiKey: "AIzaSyDy4mU5xpso1OtTA86rbABnwXU6xH_Y5Jk",
        authDomain: "wind-client-b6c33.firebaseapp.com", // Проверь этот домен в консоли Firebase
        databaseURL: "https://wind-client-b6c33-default-rtdb.firebaseio.com",
        projectId: "wind-client-b6c33",
        storageBucket: "wind-client-b6c33.appspot.com",
        messagingSenderId: "563829471023",
        appId: "1:563829471023:web:7f6a8b9c0d1e2f3a"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК
    function switchTab(type) {
        if(type === 'login') {
            document.getElementById('form-login').classList.remove('hidden');
            document.getElementById('form-register').classList.add('hidden');
            document.getElementById('tab-login').className = "text-purple-500 font-bold border-b-2 border-purple-500 pb-1";
            document.getElementById('tab-register').className = "text-gray-500 hover:text-white transition";
        } else {
            document.getElementById('form-login').classList.add('hidden');
            document.getElementById('form-register').classList.remove('hidden');
            document.getElementById('tab-register').className = "text-purple-500 font-bold border-b-2 border-purple-500 pb-1";
            document.getElementById('tab-login').className = "text-gray-500 hover:text-white transition";
        }
    }

    // РЕГИСТРАЦИЯ
    function signUp() {
        const email = document.getElementById('reg-email').value;
        const pass = document.getElementById('reg-pass').value;
        const nick = document.getElementById('reg-nick').value;

        auth.createUserWithEmailAndPassword(email, pass)
            .then((userCredential) => {
                const user = userCredential.user;
                // Сохраняем данные юзера в базу
                db.ref('users/' + user.uid).set({
                    username: nick,
                    email: email,
                    rank: 'User',
                    subscription: 'None'
                });
                alert("Аккаунт создан! Теперь войдите.");
                switchTab('login');
            })
            .catch((error) => alert(error.message));
    }

    // ВХОД
    function signIn() {
        const email = document.getElementById('log-email').value;
        const pass = document.getElementById('log-pass').value;

        auth.signInWithEmailAndPassword(email, pass)
            .then((userCredential) => {
                const user = userCredential.user;
                
                // ПРОВЕРКА НА ДЕВЕЛОПЕРА
                // Если твой email, например, dev@wind.com
                if (email === "developer@wind.com") { // Укажи тут свой email
                    document.getElementById('dev-dashboard').classList.remove('hidden');
                    alert("Welcome, Creator.");
                } else {
                    alert("Успешный вход! Личный кабинет в разработке.");
                    // Тут можно перенаправить на страницу с подпиской юзера
                }
            })
            .catch((error) => alert(error.message));
    }

    // ГЕНЕРАЦИЯ КЛЮЧА (Запись в Firebase)
    function generateKey() {
        const type = document.getElementById('key-type').value;
        const key = "WIND-" + Math.random().toString(36).substring(2, 10).toUpperCase();
        
        db.ref('license_keys/' + key).set({
            plan: type,
            owner: "none",
            status: "unused"
        }).then(() => {
            alert("Ключ создан: " + key);
            console.log("Key saved to Firebase");
        });
    }
</script>
